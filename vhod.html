<!DOCTYPE html>

<html lang="ru">
<head>

    <!-- Адаптивность для мобильных устройств -->

    <!-- ============================================

    ============================================ -->

    <!-- ============================================
        ФОРМА ВХОДА (VHOD SECTION)
    ============================================ -->
    <section id="vhod" class="vhod-form">
        <h2>Вход пользователя</h2>
        <h1>ведите свои данные при регистрации</h1>
        
        <!-- Форма регистрации -->
        <form action="#" method="post">

            <!-- Поле: Email -->
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <!-- Поле: Пароль -->
            <label for="password">Пароль:</label>
            <input type="password" id="password" name="password" required>
            
            <!-- Кнопка отправки формы -->
            <button type="submit" class="submit-btn">Войти</button>
        </form>
        <div class="regestr_action">
            <label for="acaynt_no">Если нет акаунты то можете</label>
            <a class="a_href" href="regestrashi.html">Зарегистрироваться</a>

    </section>
